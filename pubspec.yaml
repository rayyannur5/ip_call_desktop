name: ip_call_desktop
description: "Nurse Call Desktop Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # State Management & Routing
  get: ^5.0.0-release-candidate-9.3.3
  get_storage: ^2.1.1

  # MQTT
  mqtt_client: ^10.11.11

  # SIP
  sip_ua: ^1.1.0

  # Database (direct MySQL)
  mysql_client: ^0.0.27

  # Audio
  audioplayers: ^6.1.0

  # HTTP (for downloading dynamic audio files)
  http: ^1.2.0

  # Utilities
  intl: ^0.20.2
  process_run: ^1.2.0
  path_provider: ^2.1.0
  path: ^1.9.0
  window_manager: ^0.5.1
  webview_all: ^1.2.1

  # Logging (file output + size/count-based rotation)
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Vendored fork of webview_all_linux 1.2.1 with an X11 input fix: the webview's
# GdkWindow is promoted to a native X window so clicks land on the webview under
# XFCE/LXQt (X11) instead of passing through to the window behind. See
# third_party/webview_all_linux/linux/src/webview/linux_webview.cc.
dependency_overrides:
  webview_all_linux:
    path: third_party/webview_all_linux

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/speaks/
    - assets/icons/
